name: Daily Blog Post

on:
  schedule:
    - cron: '0 1 * * *'  # 매일 한국 시간 오전 10시 실행
  workflow_dispatch:      # 수동 실행 버튼 활성화

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install anthropic requests ddgs google-api-python-client google-auth-httplib2 google-auth-oauthlib
      
      - name: Run blog post
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
        run: python main.py
