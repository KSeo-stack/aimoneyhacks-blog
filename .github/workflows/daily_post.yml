name: 🚀 Daily AI Blog Automation - Draft Test

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic google-api-python-client google-auth-oauthlib google-auth-httplib2 ddgs

      - name: 🤖 Run Automation Script in Draft Mode
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          DRAFT_MODE: "true"
        run: python main.py

      - name: 📦 Upload draft backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: draft-backups
          path: draft_backups/*.html
          if-no-files-found: ignore
